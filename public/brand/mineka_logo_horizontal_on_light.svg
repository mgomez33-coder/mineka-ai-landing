<svg xmlns="http://www.w3.org/2000/svg" viewBox="145 150 1225 300" role="img" aria-label="MINEKA AI — AI Operations">

<defs>
  <linearGradient id="minekaStroke" x1="0" y1="0" x2="220" y2="120" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#18D8F2"/>
    <stop offset="0.52" stop-color="#44D9B5"/>
    <stop offset="1" stop-color="#A8F034"/>
  </linearGradient>
  <linearGradient id="minekaGlow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#18D8F2" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#A8F034" stop-opacity="0.45"/>
  </linearGradient>
  <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <style>
    .word { font-family: 'DejaVu Sans', 'Montserrat', 'Inter', Arial, sans-serif; font-weight: 700; letter-spacing: 0.22em; }
    .sub { font-family: 'DejaVu Sans', 'Montserrat', 'Inter', Arial, sans-serif; font-weight: 500; letter-spacing: 0.34em; }
    .micro { font-family: 'DejaVu Sans', 'Montserrat', 'Inter', Arial, sans-serif; font-weight: 600; letter-spacing: 0.20em; }
  </style>
</defs>


<g transform="translate(155 168) scale(1.42)">
  <path d="M32 152 L32 32 L110 88 L188 32 L188 152" fill="none" stroke="url(#minekaStroke)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M32 152 L110 105 L188 152" fill="none" stroke="url(#minekaStroke)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.96"/>
  <circle cx="32" cy="152" r="18" fill="#031923" stroke="#18D8F2" stroke-width="10"/>
  <circle cx="110" cy="105" r="18" fill="#031923" stroke="#44D9B5" stroke-width="10"/>
  <circle cx="188" cy="152" r="18" fill="#031923" stroke="#A8F034" stroke-width="10"/>
</g>
<text x="535" y="285" class="word" font-size="98" fill="#071723">MINEKA AI</text>
<text x="542" y="370" class="sub" font-size="39" fill="#02AFC9">AI Operations</text>
