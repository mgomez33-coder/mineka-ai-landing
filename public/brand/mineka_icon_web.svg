<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

<defs>
  <linearGradient id="minekaStroke" x1="0" y1="0" x2="220" y2="120" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#18D8F2"/>
    <stop offset="0.52" stop-color="#44D9B5"/>
    <stop offset="1" stop-color="#A8F034"/>
  </linearGradient>
  <linearGradient id="minekaGlow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#18D8F2" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#A8F034" stop-opacity="0.45"/>
  </linearGradient>
  <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <style>
    .word { font-family: 'DejaVu Sans', 'Montserrat', 'Inter', Arial, sans-serif; font-weight: 700; letter-spacing: 0.22em; }
    .sub { font-family: 'DejaVu Sans', 'Montserrat', 'Inter', Arial, sans-serif; font-weight: 500; letter-spacing: 0.34em; }
    .micro { font-family: 'DejaVu Sans', 'Montserrat', 'Inter', Arial, sans-serif; font-weight: 600; letter-spacing: 0.20em; }
  </style>
</defs>


<g transform="translate(250 272) scale(2.4)">
